<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa D.A</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Gestão Financeira - D.A</h1>
  </header>

  <div class="container">
    <div class="cards">
      <div class="card">
        <h3>Saldo atual</h3>
        <p id="saldo">R$0,00</p>
      </div>
      <div class="card">
        <h3>Entradas</h3>
        <p id="entradas">R$0,00</p>
      </div>
      <div class="card">
        <h3>Saídas</h3>
        <p id="saidas">R$0,00</p>
      </div>
    </div>

    <div class="box">
      <div class="buttons">
        <button id="entradaBtn" class="active">+ Entrada</button>
        <button id="saidaBtn">- Saída</button>
      </div>

      <form id="form">
        <input type="text" id="descricao" placeholder="Descrição" required>
        <input type="number" id="valor" placeholder="Valor (R$)" step="0.01" required>
        <input type="date" id="data" required>
        <select id="evento">
          <option value="Eventos">Eventos</option>
          <option value="Outros">Outros</option>
        </select>
        <textarea id="obs" placeholder="Observações"></textarea>
        <button type="submit">Registrar</button>
      </form>
    </div>

    <div class="box">
      <h2>Histórico</h2>
      <button onclick="limparHistorico()">Apagar todo histórico</button>
      <div id="lista"></div>
    </div>

    <div class="box">
      <h2>Gráfico</h2>
      <canvas id="financeChart"></canvas>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
