<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesouraria D.A</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="overlay"></div>

<div class="container">

  <header>
    <h1>Tesouraria D.A</h1>
    <p>Controle financeiro estudantil</p>
  </header>

  <section class="cards">
    <div class="card">
      <span>Saldo Atual</span>
      <h2 id="saldo">R$ 0,00</h2>
    </div>
    <div class="card">
      <span>Entradas</span>
      <h2 id="entradas">R$ 0,00</h2>
    </div>
    <div class="card">
      <span>Saídas</span>
      <h2 id="saidas">R$ 0,00</h2>
    </div>
  </section>

  <section class="box">
    <div class="toggle-buttons">
      <button id="btnEntrada" class="ativo" type="button">Entrada</button>
      <button id="btnSaida" type="button">Saída</button>
    </div>

    <form id="formulario">
      <input type="text" id="descricao" placeholder="Descrição" required>
      <input type="number" id="valor" placeholder="Valor" step="0.01" required>
      <input type="date" id="data" required>
      <input type="text" id="evento" placeholder="Evento">
      <select id="categoria">
        <option>Eventos</option>
        <option>Patrocínio</option>
        <option>Materiais</option>
        <option>Outros</option>
      </select>
      <textarea id="obs" placeholder="Observações"></textarea>
      <button type="submit">Salvar Lançamento</button>
    </form>
  </section>

  <section class="box">
    <h2>Gráfico Financeiro</h2>
    <canvas id="grafico"></canvas>
  </section>

  <section class="box">
    <h2>Histórico</h2>
    <button onclick="limparHistorico()">Apagar todo histórico</button>
    <div class="meses" id="abasMeses"></div>
    <div id="lista"></div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
